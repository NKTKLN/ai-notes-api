services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_notes_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shrimp
      POSTGRES_PASSWORD: passwordshrimp
      POSTGRES_DB: ai_notes
    ports:
      - "5432:5432"
    volumes:
      - ai_notes_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shrimp -d ai_notes"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai_notes_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: shrimp
      MINIO_ROOT_PASSWORD: passwordshrimp
    volumes:
      - ai_notes_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: .
    container_name: ai_notes_api
    restart: unless-stopped
    command: ["api"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build: .
    container_name: ai_notes_api_worker
    restart: unless-stopped
    command: ["worker"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    healthcheck:
      test: ["CMD-SHELL", "celery -A ai_notes_api.workers.celery_app.celery_app inspect ping -d celery@$${HOSTNAME} --timeout=10"]
      interval: 30s
      timeout: 15s
      start_period: 20s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  ai_notes_pg_data:
  ai_notes_minio_data:

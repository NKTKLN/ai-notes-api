services:
  db:
    image: postgres:16
    container_name: ai_notes_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shrimp
      POSTGRES_PASSWORD: shrimp
      POSTGRES_DB: ai_notes
    ports:
      - "5432:5432"
    volumes:
      - ai_notes_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shrimp -d ai_notes"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: ai_notes_api
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: shrimp
      POSTGRES_PASSWORD: shrimp
      POSTGRES_DB: ai_notes
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  ai_notes_pg_data:

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_notes_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shrimp
      POSTGRES_PASSWORD: shrimp
      POSTGRES_DB: ai_notes
    ports:
      - "5432:5432"
    volumes:
      - ai_notes_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shrimp -d ai_notes"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai_notes_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: ai_notes_api
    restart: unless-stopped
    command: ["api"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: ai_notes_api_worker
    restart: unless-stopped
    command: ["worker"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    healthcheck:
      test:
        ["CMD", "celery", "-A", "ai_notes_api.workers.celery_app.celery_app",
         "inspect", "ping", "-d", "celery@$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  ai_notes_pg_data:
